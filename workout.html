// ─── HELPERS ──────────────────────────────────────────────────────────────────

function todayName() {
  const d = new Date().getDay();
  return DAYS[d === 0 ? 6 : d - 1];
}

function fmt(n) {
  const num = Number(n);
  return Number.isInteger(num) ? String(num) : num.toFixed(1);
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function calcVolume(sets) {
  return (sets || []).reduce((s, x) => s + (Number(x.weight) || 0) * (Number(x.reps) || 0), 0);
}

function getSuggestion(exerciseId, targetReps, logs) {
  const relevant = (logs || [])
    .filter(l => l.exercises?.some(e => e.exerciseId === exerciseId))
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  if (!relevant.length) return null;
  const lastEx = relevant[0].exercises.find(e => e.exerciseId === exerciseId);
  if (!lastEx?.sets?.length) return null;
  const maxW = Math.max(...lastEx.sets.map(s => Number(s.weight) || 0));
  if (!maxW) return null;
  const allHit = lastEx.sets.every(s => Number(s.reps) >= (targetReps || 0));
  return { weight: allHit ? maxW + 2.5 : maxW, increased: allHit };
}

// Set dot indicators  ●●●○
function SetDots({ done, total, size=9 }) {
  return (
    <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          width: size, height: size, borderRadius: '50%',

          transition: 'background 0.25s ease',

    </div>
  );
}

// ─── SVG LINE CHART ───────────────────────────────────────────────────────────

function LineChart({ data }) {
  if (!data || data.length < 2) {
    return (
      <div style={{ height: 120, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
        <div style={{ width: 36, height: 36, borderRadius: '50%', background: T.card2, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon.Chart size={18} color={T.dim} />
        </div>
        <span style={{ color: T.dim, fontSize: 13 }}>Log more sessions to see a chart</span>
      </div>
    );
  }
  const W = 320, H = 130;
  const padL = 38, padR = 8, padT = 12, padB = 28;
  const w = W - padL - padR, h = H - padT - padB;
  const vals = data.map(d => d.value);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const px = i => padL + (i / (data.length - 1)) * w;
  const py = v => padT + h - ((v - min) / range) * h;
  const pts = data.map((d, i) => `${px(i)},${py(d.value)}`).join(' ');
  const yTicks = [min, max];
  const showLabel = i => data.length <= 5 || i === 0 || i === data.length - 1 || i % Math.ceil(data.length / 4) === 0;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible' }}>
      {yTicks.map((v, i) => (
        <g key={i}>
          <line x1={padL} y1={py(v)} x2={padL + w} y2={py(v)} stroke={T.border} strokeWidth={1} strokeDasharray="4,4" />
          <text x={padL - 5} y={py(v) + 4} textAnchor="end" fill={T.dim} fontSize={9} fontWeight="600">{fmt(v)}</text>
        </g>
      ))}
      <polyline points={pts} fill="none" stroke={T.lime} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round" />
      {data.map((d, i) => (
        <circle key={i} cx={px(i)} cy={py(d.value)} r={3.5} fill={T.lime} />
      ))}
      {data.map((d, i) => showLabel(i) && (
        <text key={i} x={px(i)} y={H - 2} textAnchor="middle" fill={T.dim} fontSize={9} fontWeight="500">{d.label}</text>
      ))}
    </svg>
  );
}

// ─── REST TIMER ───────────────────────────────────────────────────────────────

function RestTimer() {
  const [active, setActive] = useState(false);
  const [total,  setTotal]  = useState(90);
  const [left,   setLeft]   = useState(90);

  useEffect(() => {
    if (!active) return;
    if (left <= 0) { setActive(false); return; }
    const t = setTimeout(() => setLeft(l => l - 1), 1000);
    return () => clearTimeout(t);
  }, [active, left]);

  const start = s => { setTotal(s); setLeft(s); setActive(true); };
  const stop  = () => { setActive(false); setLeft(total); };

  if (!active) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
        <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.dim, marginRight: 2 }}>Rest</span>
        {[60, 90, 120, 180].map(s => (
          <button key={s} onClick={() => start(s)} style={{
            background: T.card2, border: `1px solid ${T.border2}`, color: T.white,
            borderRadius: 8, padding: '5px 11px', fontSize: 12, fontWeight: 600,
          }}>{s}s</button>
        ))}
      </div>
    );
  }

  const r    = 19;
  const circ = 2 * Math.PI * r;
  const dash = circ * (left / total);
  const warn = left <= 10;

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <svg width={48} height={48} style={{ flexShrink: 0 }}>
        <circle cx={24} cy={24} r={r} fill="none" stroke={T.muted} strokeWidth={2.5} />
        <circle cx={24} cy={24} r={r} fill="none"
          stroke={warn ? T.red : T.lime}
          strokeWidth={2.5}
          strokeDasharray={`${dash} ${circ}`}
          strokeLinecap="round"
          transform="rotate(-90 24 24)" />
        <text x={24} y={28} textAnchor="middle" fill={warn ? T.red : T.white} fontSize={12} fontWeight="800">{left}</text>
      </svg>
      <button onClick={stop} style={{
        background: T.card2, border: `1px solid ${T.border2}`,
        color: T.dim, borderRadius: 8, padding: '6px 14px', fontSize: 12, fontWeight: 600,
      }}>Skip</button>
    </div>
  );
}

  const source = exercises.find(e => e.id === exerciseId);

  const c      = mgColor(source?.muscleGroup);

  return (

      <div style={{ background: T.card, borderRadius: '20px 20px 0 0', width: '100%', maxWidth: 480, maxHeight: '72vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          <div style={{ width: 36, height: 4, borderRadius: 2, background: T.border2 }} />

          <div style={{ fontWeight: 800, fontSize: 17, letterSpacing: '-0.02em', marginBottom: 4 }}>Swap Exercise</div>

            <MgPill group={source?.muscleGroup} />

          {alts.length === 0 ? (
            <div style={{ color: T.dim, textAlign: 'center', padding: '32px 0', fontSize: 14 }}>No alternatives in your library</div>

  );
}

// ─── EXERCISE CARD (active workout) ──────────────────────────────────────────

function ExerciseCard({ wex, exercise, logs, onLogSet, onSwap, isExpanded, onToggle }) {
  const suggestion = useMemo(() => getSuggestion(wex.exerciseId, wex.targetReps, logs), [wex.exerciseId, wex.targetReps, logs]);
  const [weight, setWeight] = useState(() => suggestion ? fmt(suggestion.weight) : '');
  const [reps,   setReps]   = useState('');
  const [flash,  setFlash]  = useState(false);

  useEffect(() => {
    if (suggestion && !weight) setWeight(fmt(suggestion.weight));
  }, [suggestion]);

  const done   = wex.sets.length >= wex.targetSets;
  const color  = mgColor(exercise?.muscleGroup);

  const handleLog = () => {
    if (!weight || !reps) return;
    onLogSet(parseFloat(weight), parseInt(reps));
    setReps('');
    setFlash(true);
    setTimeout(() => setFlash(false), 400);
  };

  return (
    <div className="ex-card" style={{
      background: flash ? `${T.lime}10` : done ? `rgba(200,255,0,0.05)` : T.card,
      borderRadius: 16,
      border: `1px solid ${done ? `rgba(200,255,0,0.25)` : T.border}`,
      borderLeft: `3px solid ${done ? T.lime : color}`,
      marginBottom: 10,
      overflow: 'hidden',
      transition: 'background 0.3s, border-color 0.2s',
    }}>
      {/* Collapsed header */}
      <div onClick={onToggle} style={{ padding: '16px 16px', display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer' }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
            <span style={{ fontWeight: 800, fontSize: 15, letterSpacing: '-0.02em' }}>{exercise?.name || '?'}</span>
            {done && (
              <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: '0.06em', textTransform: 'uppercase', background: T.lime, color: '#000', borderRadius: 5, padding: '2px 7px' }}>Done</span>
            )}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <SetDots done={wex.sets.length} total={wex.targetSets} />
            <span style={{ color: T.dim, fontSize: 12 }}>{wex.targetSets}×{wex.targetReps}</span>
            {suggestion && (
              <span style={{ fontSize: 12, fontWeight: 700, color: suggestion.increased ? T.lime : T.dim }}>
                {suggestion.increased ? '↑' : '→'} {fmt(suggestion.weight)} kg
              </span>
            )}
          </div>
        </div>
        <div style={{ color: T.dim, fontSize: 13, flexShrink: 0 }}>
          {isExpanded ? '▲' : '▼'}
        </div>
      </div>

      {/* Expanded */}
      {isExpanded && (
        <div style={{ borderTop: `1px solid ${T.border}` }}>
          {/* Logged sets */}
          {wex.sets.length > 0 && (
            <div style={{ padding: '12px 16px 4px' }}>
              {wex.sets.map((s, i) => (
                <div key={i} style={{
                  display: 'flex', gap: 8, alignItems: 'center', padding: '6px 0',
                  borderBottom: i < wex.sets.length - 1 ? `1px solid ${T.border}` : 'none',
                }}>
                  <span style={{ width: 24, fontSize: 11, fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase', color: T.dim }}>S{i+1}</span>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{fmt(s.weight)} <span style={{ fontWeight: 400, color: T.dim, fontSize: 12 }}>kg</span></span>
                  <span style={{ color: T.muted, fontSize: 12 }}>×</span>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{s.reps} <span style={{ fontWeight: 400, color: T.dim, fontSize: 12 }}>reps</span></span>
                  <span style={{ marginLeft: 'auto', color: T.lime, fontSize: 14 }}>✓</span>
                </div>
              ))}
            </div>
          )}

          {/* Input area */}
          {!done && (
            <div style={{ padding: '16px 16px 12px' }}>
              <div style={{
                fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase',
                color: T.dim, marginBottom: 14,
              }}>Set {wex.sets.length + 1} of {wex.targetSets}</div>

              {/* Stepper controls — stacked so each gets full width */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 14 }}>
                {/* Weight stepper */}
                <div>
                  <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.dim, marginBottom: 6 }}>Weight (kg)</div>
                  <div style={{ display: 'flex', alignItems: 'center', background: T.card2, borderRadius: 12, border: `1.5px solid ${T.border2}` }}>
                    <button onClick={() => setWeight(w => fmt(Math.max(0, parseFloat(w||0) - 2.5)))} style={{
                      width: 52, background: 'none', border: 'none', color: T.dim,
                      fontSize: 24, fontWeight: 300, flexShrink: 0, padding: '14px 0',
                    }}>−</button>
                    <input
                      type="number" inputMode="decimal" value={weight}
                      onChange={e => setWeight(e.target.value)}
                      placeholder={suggestion ? fmt(suggestion.weight) : '0'}
                      style={{
                        flex: 1, width: 0, background: 'none', border: 'none', color: T.white,
                        fontSize: 32, fontWeight: 800, letterSpacing: '-0.02em',
                        textAlign: 'center', padding: '14px 0',
                      }}
                    />
                    <button onClick={() => setWeight(w => fmt(parseFloat(w||0) + 2.5))} style={{
                      width: 52, background: 'none', border: 'none', color: T.lime,
                      fontSize: 24, fontWeight: 300, flexShrink: 0, padding: '14px 0',
                    }}>+</button>
                  </div>
                </div>
                {/* Reps stepper */}
                <div>
                  <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.dim, marginBottom: 6 }}>Reps</div>
                  <div style={{ display: 'flex', alignItems: 'center', background: T.card2, borderRadius: 12, border: `1.5px solid ${T.border2}` }}>
                    <button onClick={() => setReps(r => String(Math.max(1, parseInt(r||wex.targetReps) - 1)))} style={{
                      width: 52, background: 'none', border: 'none', color: T.dim,
                      fontSize: 24, fontWeight: 300, flexShrink: 0, padding: '14px 0',
                    }}>−</button>
                    <input
                      type="number" inputMode="numeric" value={reps}
                      onChange={e => setReps(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && handleLog()}
                      placeholder={String(wex.targetReps)}
                      style={{

// ─── RING PROGRESS ────────────────────────────────────────────────────────────

function RingProgress({ done, total, size = 64 }) {
  const strokeW = 5;
  const r       = (size - strokeW * 2) / 2;
  const circ    = 2 * Math.PI * r;
  const pct     = total > 0 ? Math.min(done / total, 1) : 0;
  const cx = size / 2, cy = size / 2;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)', display: 'block' }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={T.muted} strokeWidth={strokeW} />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={T.lime} strokeWidth={strokeW}
          strokeDasharray={`${pct * circ} ${circ}`} strokeLinecap="round"
          style={{ transition: 'stroke-dasharray 0.4s ease' }} />
      </svg>
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      }}>
        <span style={{ fontWeight: 800, fontSize: size * 0.25, color: T.lime, letterSpacing: '-0.02em', lineHeight: 1 }}>{done}</span>
        <span style={{ fontSize: size * 0.17, color: T.dim, lineHeight: 1 }}>/{total}</span>
      </div>
    </div>
  );
}

// ─── DAY STRIP ────────────────────────────────────────────────────────────────

function DayStrip({ program }) {
  const today = todayName();
  const labels = ['M','T','W','T','F','S','S'];
  return (
    <div style={{ display: 'flex', gap: 4, marginBottom: 16 }}>
      {DAYS.map((day, i) => {
        const isToday   = day === today;
        const hasWork   = (program[day] || []).length > 0;
        return (
          <div key={day} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: isToday ? T.lime : T.dim }}>{labels[i]}</span>
            <div style={{
              width: 30, height: 30, borderRadius: '50%',
              background: isToday ? T.lime : 'transparent',
              border: `1.5px solid ${isToday ? T.lime : hasWork ? T.border2 : T.border}`,

// ─── BACKUP NUDGE ─────────────────────────────────────────────────────────────

function BackupNudge({ onGoToSettings }) {
  const lastBackup = S.get('wa_last_backup', null);
  const [dismissed, setDismissed] = useState(false);

  const daysSince = lastBackup
    ? Math.floor((Date.now() - new Date(lastBackup).getTime()) / 86400000)
    : null;

  const show = !dismissed && (lastBackup === null || daysSince >= 7);
  if (!show) return null;

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      background: 'rgba(200,255,0,0.08)', border: '1px solid rgba(200,255,0,0.2)',
      borderRadius: 12, padding: '10px 14px', marginBottom: 12,
    }}>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: T.lime, marginBottom: 1 }}>Back up your data</div>
        <div style={{ fontSize: 12, color: T.dim }}>
          {lastBackup === null ? 'You haven\'t backed up yet.' : `Last backup ${daysSince}d ago.`}
        </div>
      </div>
      <button onClick={onGoToSettings} style={{
        background: T.lime, border: 'none', color: '#000',
        borderRadius: 8, padding: '7px 12px', fontSize: 12, fontWeight: 800, flexShrink: 0,
      }}>Export</button>
      <button onClick={() => setDismissed(true)} style={{
        background: 'none', border: 'none', color: T.dim,
        fontSize: 18, lineHeight: 1, padding: '0 2px', flexShrink: 0, cursor: 'pointer',
      }}>×</button>
    </div>
  );
}

// ─── TODAY VIEW ───────────────────────────────────────────────────────────────

function TodayView({ exercises, program, logs, activeWorkout, setActiveWorkout, saveWorkout, setTab }) {
  const today      = todayName();
  const todayIso   = new Date().toISOString().split('T')[0];
  const todayProg  = program[today] || [];
  const [expandedIdx, setExpandedIdx] = useState(null);
  const [swapIdx,     setSwapIdx]     = useState(null);

  const lastLog  = useMemo(() => (logs || []).find(l => l.dayName === today && l.date !== todayIso), [logs, today, todayIso]);

  const startWorkout = () => setActiveWorkout({
    dayName: today,

  const logSet = (idx, weight, reps) => setActiveWorkout(prev => ({
    ...prev,
    exercises: prev.exercises.map((e, i) => i === idx ? { ...e, sets: [...e.sets, { weight, reps }] } : e),
  }));

  const swapExercise = (exIdx, newId) => {
    setActiveWorkout(prev => ({
      ...prev,
      exercises: prev.exercises.map((e, i) => i === exIdx ? { ...e, exerciseId: newId, sets: [] } : e),
    }));
    setSwapIdx(null);
  };

  const setsCompleted  = (activeWorkout?.exercises || []).filter(e => e.sets.length >= e.targetSets).length;

  // ── REST DAY ──
  if (todayProg.length === 0 && !activeWorkout) {
    return (

        <DayStrip program={program} />
        <BackupNudge onGoToSettings={() => setTab('settings')} />

    const totalVol   = (todayLog.exercises || []).reduce((s, e) =>
      s + (e.sets || []).reduce((sv, set) => sv + (Number(set.weight) || 0) * (Number(set.reps) || 0), 0), 0);
    return (
      <div style={{ padding: '0 16px' }}>
        <div style={{ paddingTop: 20, paddingBottom: 20 }}>
          <Wordmark />
          <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.dim, marginTop: 10 }}>{today}</div>
        </div>
        <BackupNudge onGoToSettings={() => setTab('settings')} />

        {/* Completed banner */}
        <div style={{ background: T.lime, borderRadius: 20, padding: '28px 20px', textAlign: 'center', marginBottom: 16 }}>

// ─── PROGRESS VIEW ────────────────────────────────────────────────────────────

function ProgressView({ exercises, logs }) {
  const loggedIds = useMemo(() => {
    const ids = new Set();
    (logs || []).forEach(l => (l.exercises || []).forEach(e => ids.add(e.exerciseId)));
    return [...ids];
  }, [logs]);

  const [selId,        setSelId]        = useState(null);
  const [chartMode,    setChartMode]    = useState('weight');
  const [filterGroup,  setFilterGroup]  = useState('All');

  const filteredIds = useMemo(() => {
    if (filterGroup === 'All') return loggedIds;
    return loggedIds.filter(id => exercises.find(e => e.id === id)?.muscleGroup === filterGroup);
  }, [loggedIds, filterGroup, exercises]);

  const activeId = selId && filteredIds.includes(selId) ? selId : filteredIds[0];
  const activeEx = exercises.find(e => e.id === activeId);

  const sessionsForEx = useMemo(() =>
    (logs || []).filter(l => (l.exercises||[]).some(e => e.exerciseId === activeId))
      .sort((a, b) => new Date(a.date) - new Date(b.date)),
    [logs, activeId]
  );

  const weightData = useMemo(() => sessionsForEx.map(l => {
    const ex  = l.exercises.find(e => e.exerciseId === activeId);
    const max = Math.max(...(ex?.sets||[]).map(s => Number(s.weight)||0));
    return { label: fmtDate(l.date), value: max };
  }).filter(d => d.value > 0), [sessionsForEx, activeId]);

  const volumeData = useMemo(() => sessionsForEx.map(l => {
    const ex = l.exercises.find(e => e.exerciseId === activeId);
    return { label: fmtDate(l.date), value: calcVolume(ex?.sets) };
  }).filter(d => d.value > 0), [sessionsForEx, activeId]);

  const recentSessions = [...sessionsForEx].reverse().slice(0, 6);
  const bestWeight     = weightData.length ? Math.max(...weightData.map(d => d.value)) : null;

  if ((logs || []).length === 0) {
    return (
      <div style={{ padding: '0 16px' }}>
        <Header left="Progress" sub="Stats" />
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', paddingTop: 60, gap: 12 }}>
          <div style={{ width: 64, height: 64, borderRadius: '50%', background: T.card, border: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon.Chart size={28} color={T.dim} />
          </div>
          <div style={{ fontWeight: 800, fontSize: 20, letterSpacing: '-0.02em' }}>No data yet</div>
          <div style={{ color: T.dim, fontSize: 14, textAlign: 'center', maxWidth: 260 }}>Finish your first workout to start tracking progression.</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: '0 16px' }}>
      <Header left="Progress" sub="Stats" />

      {/* Muscle group filter pills */}
      <div className="chip-row" style={{ marginBottom: 12 }}>
        {['All', ...MUSCLE_GROUPS.filter(g => loggedIds.some(id => exercises.find(e => e.id === id)?.muscleGroup === g))].map(g => (
          <button key={g} onClick={() => { setFilterGroup(g); setSelId(null); }} style={{
            background: filterGroup === g ? T.lime : T.card,
            border: `1px solid ${filterGroup === g ? T.lime : T.border}`,
            color: filterGroup === g ? '#000' : T.white,
            borderRadius: 20, padding: '6px 14px', fontSize: 12,
            fontWeight: filterGroup === g ? 800 : 500, whiteSpace: 'nowrap', flexShrink: 0,
          }}>{g}</button>
        ))}
      </div>

      {/* Exercise picker */}
      <select value={activeId || ''} onChange={e => setSelId(e.target.value)} style={{
        width: '100%', background: T.card, border: `1px solid ${T.border}`, borderRadius: 12,
        color: T.white, padding: '13px 14px', fontSize: 15, fontWeight: 600, marginBottom: 16, appearance: 'none',
      }}>
        {filteredIds.map(id => <option key={id} value={id}>{exercises.find(e => e.id === id)?.name || id}</option>)}
      </select>

      {activeEx && (
        <>
          {/* Stat grid */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 16 }}>
            {[
              { label: 'Sessions',    value: sessionsForEx.length },
              { label: 'Best Weight', value: bestWeight != null ? `${fmt(bestWeight)} kg` : '—' },
              { label: 'Last Trained', value: sessionsForEx.length ? fmtDate(sessionsForEx[sessionsForEx.length-1].date) : '—' },
              { label: 'Last Volume', value: volumeData.length ? `${Math.round(volumeData[volumeData.length-1].value)} kg` : '—' },
            ].map(({ label, value }) => (
              <div key={label} style={{ background: T.card, borderRadius: 14, padding: '16px', border: `1px solid ${T.border}` }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.dim, marginBottom: 6 }}>{label}</div>
                <div style={{ fontWeight: 800, fontSize: 24, letterSpacing: '-0.03em' }}>{value}</div>
              </div>
            ))}
          </div>

          {/* Chart toggle */}
          <div style={{ display: 'flex', background: T.card, borderRadius: 12, padding: 4, marginBottom: 12, border: `1px solid ${T.border}` }}>
            {[['weight','Max Weight'], ['volume','Volume']].map(([v,l]) => (
              <button key={v} onClick={() => setChartMode(v)} style={{
                flex: 1, background: chartMode === v ? T.lime : 'none', border: 'none',
                color: chartMode === v ? '#000' : T.dim, borderRadius: 9, padding: '9px',
                fontSize: 13, fontWeight: chartMode === v ? 800 : 500, letterSpacing: '-0.01em',
              }}>{l}</button>
            ))}
          </div>

          {/* Chart */}
          <div style={{ background: T.card, borderRadius: 16, padding: '16px 10px 8px', marginBottom: 20, border: `1px solid ${T.border}` }}>
            <LineChart data={chartMode === 'weight' ? weightData : volumeData} />
          </div>

          {/* Recent sessions */}
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: T.dim, marginBottom: 12 }}>Recent Sessions</div>
          {recentSessions.map((log, i) => {
            const ex = log.exercises.find(e => e.exerciseId === activeId);
            return (
              <div key={i} style={{ background: T.card, borderRadius: 14, padding: '14px 16px', marginBottom: 8, border: `1px solid ${T.border}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>
                    {new Date(log.date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}
                  </span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: T.dim }}>Vol {Math.round(calcVolume(ex?.sets))} kg</span>
                </div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {(ex?.sets||[]).map((s, j) => (
                    <span key={j} style={{ background: T.card2, borderRadius: 7, padding: '4px 10px', fontSize: 12, fontWeight: 600, color: T.dim }}>
                      {fmt(s.weight)}×{s.reps}
                    </span>
                  ))}
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

// ─── LIBRARY VIEW ─────────────────────────────────────────────────────────────

function LibraryView({ exercises, setExercises, logs }) {
  const [addOpen,     setAddOpen]     = useState(false);
  const [newName,     setNewName]     = useState('');
  const [newGroup,    setNewGroup]    = useState('Chest');
  const [filterGroup, setFilterGroup] = useState('All');
  const [search,      setSearch]      = useState('');

  const getLastWeight = useCallback(id => {
    const relevant = (logs||[]).filter(l => l.exercises?.some(e => e.exerciseId === id)).sort((a,b) => new Date(b.date)-new Date(a.date));
    if (!relevant.length) return null;
    const ex = relevant[0].exercises.find(e => e.exerciseId === id);
    const w  = Math.max(...(ex?.sets||[]).map(s => Number(s.weight)||0));
    return w > 0 ? w : null;
  }, [logs]);

  const grouped = useMemo(() => {
    const filtered = exercises.filter(e => {
      const mg = filterGroup === 'All' || e.muscleGroup === filterGroup;
      const sr = e.name.toLowerCase().includes(search.toLowerCase());
      return mg && sr;
    });
    const g = {};
    filtered.forEach(e => { (g[e.muscleGroup] = g[e.muscleGroup] || []).push(e); });
    return g;
  }, [exercises, filterGroup, search]);

  const addExercise = () => {
    if (!newName.trim()) return;
    setExercises(prev => [...prev, { id: 'c_'+Date.now(), name: newName.trim(), muscleGroup: newGroup }]);
    setNewName(''); setAddOpen(false);
  };

  return (
    <div style={{ padding: '0 16px' }}>
      <div style={{ paddingTop: 20, paddingBottom: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: T.dim, marginBottom: 4 }}>Exercise</div>
          <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: '-0.03em', lineHeight: 1 }}>Library</div>
        </div>
        <button onClick={() => setAddOpen(true)} style={{
          background: T.lime, border: 'none', color: '#000',
          borderRadius: 12, padding: '9px 18px', fontSize: 14, fontWeight: 800,
        }}>+ Add</button>
      </div>

      <input type="text" placeholder="Search exercises…" value={search} onChange={e => setSearch(e.target.value)}
        style={{ width: '100%', background: T.card, border: `1.5px solid ${T.border}`, borderRadius: 12, color: T.white, padding: '11px 14px', fontSize: 15, marginBottom: 12 }} />

      <div className="chip-row" style={{ marginBottom: 16 }}>
        {['All', ...MUSCLE_GROUPS].map(g => (
          <button key={g} onClick={() => setFilterGroup(g)} style={{
            background: filterGroup === g ? T.lime : T.card, border: `1px solid ${filterGroup === g ? T.lime : T.border}`,
            color: filterGroup === g ? '#000' : T.white, borderRadius: 20,
            padding: '6px 14px', fontSize: 12, fontWeight: filterGroup === g ? 800 : 500, whiteSpace: 'nowrap', flexShrink: 0,
          }}>{g}</button>
        ))}
      </div>

      {Object.entries(grouped).map(([group, list]) => (
        <div key={group} style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
            <div style={{ width: 3, height: 14, borderRadius: 2, background: mgColor(group) }} />
            <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: T.dim }}>{group}</span>
          </div>
          {list.map(ex => {
            const lw = getLastWeight(ex.id);
            return (
              <div key={ex.id} style={{
                background: T.card, borderRadius: 12, padding: '13px 16px', marginBottom: 6,
                border: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              }}>
                <span style={{ fontSize: 15, fontWeight: 600 }}>{ex.name}</span>
                {lw != null
                  ? <span style={{ fontSize: 13, fontWeight: 700, color: T.dim }}>{fmt(lw)} kg</span>
                  : <span style={{ fontSize: 12, color: T.muted }}>No data</span>
                }
              </div>
            );
          })}
        </div>
      ))}

      {addOpen && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.9)', zIndex: 300, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}>
          <div style={{ background: T.card, borderRadius: '20px 20px 0 0', width: '100%', maxWidth: 480, padding: '20px 16px 32px' }}>
            <div style={{ display: 'flex', justifyContent: 'center', paddingBottom: 14 }}>
              <div style={{ width: 36, height: 4, borderRadius: 2, background: T.border2 }} />
            </div>
            <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.02em', marginBottom: 20 }}>New Exercise</div>
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.dim, marginBottom: 6 }}>Name</div>
              <input type="text" value={newName} onChange={e => setNewName(e.target.value)} placeholder="e.g. Cable Fly"
                onKeyDown={e => e.key === 'Enter' && addExercise()}
                style={{ width: '100%', background: T.card2, border: `1.5px solid ${T.border2}`, borderRadius: 12, color: T.white, padding: '13px 14px', fontSize: 16 }} />
            </div>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.dim, marginBottom: 6 }}>Muscle Group</div>
              <select value={newGroup} onChange={e => setNewGroup(e.target.value)} style={{
                width: '100%', background: T.card2, border: `1.5px solid ${T.border2}`, borderRadius: 12,
                color: T.white, padding: '13px 14px', fontSize: 16, appearance: 'none',
              }}>
                {MUSCLE_GROUPS.map(g => <option key={g}>{g}</option>)}
              </select>
            </div>
            <LimeBtn onClick={addExercise}>Add Exercise</LimeBtn>
            <div style={{ marginTop: 10 }}><GhostBtn onClick={() => setAddOpen(false)}>Cancel</GhostBtn></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SETTINGS VIEW ────────────────────────────────────────────────────────────

function SettingsView({ exercises, program, logs, setExercises, setProgram, setLogs, setActiveWorkout }) {
  const [lastBackup,   setLastBackup]   = useState(() => S.get('wa_last_backup', null));
  const [importStatus, setImportStatus] = useState(null);
  const [importMsg,    setImportMsg]    = useState('');
  const [confirmReset, setConfirmReset] = useState(false);
  const fileInputRef = useRef(null);

  const totalSets = useMemo(() =>
    (logs||[]).reduce((sum,l) => sum + (l.exercises||[]).reduce((s,e) => s+(e.sets||[]).length, 0), 0),
    [logs]
  );

  const handleExport = useCallback(() => {
    const blob = new Blob([JSON.stringify({ version:2, exportedAt:new Date().toISOString(), exercises, program, logs }, null, 2)], { type:'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href:url, download:`workout-backup-${new Date().toISOString().split('T')[0]}.json` });
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    const now = new Date().toISOString(); S.set('wa_last_backup', now); setLastBackup(now);
  }, [exercises, program, logs]);

  const handleFileChange = useCallback(e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.version || !Array.isArray(data.exercises)) throw new Error();
        setExercises(data.exercises); setProgram(data.program||{}); setLogs(data.logs||[]); setActiveWorkout(null);
        setImportStatus('success');
        setImportMsg(`Restored ${(data.logs||[]).length} workouts · ${(data.exercises||[]).length} exercises · backed up ${fmtDate(data.exportedAt)}`);
      } catch {
        setImportStatus('error');
        setImportMsg('That file doesn\'t look like a valid Reps backup.');
      }
    };
    reader.readAsText(file); e.target.value = '';
  }, [setExercises, setProgram, setLogs, setActiveWorkout]);

  const handleReset = () => {
    setExercises(SEED_EXERCISES); setProgram({}); setLogs([]); setActiveWorkout(null);
    S.set('wa_last_backup', null); setLastBackup(null); setConfirmReset(false);
  };

  return (
    <div style={{ padding: '0 16px' }}>
      <Header left="Settings" sub="Reps" />

      {/* Data summary */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 24 }}>
        {[['Workouts', (logs||[]).length], ['Sets', totalSets], ['Exercises', (exercises||[]).length]].map(([label, value]) => (
          <div key={label} style={{ background: T.card, borderRadius: 14, padding: '16px 10px', border: `1px solid ${T.border}`, textAlign: 'center' }}>
            <div style={{ fontWeight: 800, fontSize: 24, letterSpacing: '-0.03em' }}>{value}</div>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: T.dim, marginTop: 4 }}>{label}</div>
          </div>
        ))}
      </div>

      {/* Backup card */}
      <div style={{ background: T.card, borderRadius: 18, border: `1px solid ${T.border}`, overflow: 'hidden', marginBottom: 16 }}>
        <div style={{ padding: '18px 18px 14px', borderBottom: `1px solid ${T.border}` }}>
          <div style={{ fontWeight: 800, fontSize: 16, letterSpacing: '-0.02em', marginBottom: 4 }}>Backup & Restore</div>
          <div style={{ color: T.dim, fontSize: 13, lineHeight: 1.5 }}>Export your data as a .json file. Import it on any device to restore everything.</div>
        </div>
        <div style={{ padding: '12px 18px', borderBottom: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: T.dim }}>Last backup</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: lastBackup ? T.lime : '#FFD93D' }}>
            {lastBackup ? fmtDate(lastBackup) : '⚠ Never'}
          </span>
        </div>
        <div style={{ padding: '16px 18px', borderBottom: `1px solid ${T.border}` }}>
          <LimeBtn onClick={handleExport} style={{ padding: '14px', fontSize: 15 }}>↓ Export Backup</LimeBtn>
          <div style={{ color: T.dim, fontSize: 12, marginTop: 8, textAlign: 'center' }}>
            workout-backup-{new Date().toISOString().split('T')[0]}.json
          </div>
        </div>
        <div style={{ padding: '16px 18px' }}>
          <input ref={fileInputRef} type="file" accept=".json" onChange={handleFileChange} style={{ display: 'none' }} />
          <GhostBtn onClick={() => { setImportStatus(null); fileInputRef.current?.click(); }} style={{ padding: '14px', fontSize: 15 }}>↑ Restore from Backup</GhostBtn>
          <div style={{ color: T.dim, fontSize: 12, marginTop: 8, textAlign: 'center' }}>Replaces all current data</div>
        </div>
      </div>

      {/* Import status */}
      {importStatus && (
        <div style={{
          background: importStatus === 'success' ? T.limeDim : T.redDim,
          border: `1px solid ${importStatus === 'success' ? 'rgba(200,255,0,0.3)' : 'rgba(255,59,48,0.3)'}`,
          borderRadius: 14, padding: '14px 16px', marginBottom: 16, display: 'flex', gap: 10, alignItems: 'flex-start',
        }}>
          <div style={{ flexShrink: 0, marginTop: 1 }}>
            {importStatus === 'success'
              ? <Icon.CheckCircle size={20} color={T.lime} />
              : <Icon.Warning size={20} color={T.red} />}
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, color: importStatus === 'success' ? T.lime : T.red, marginBottom: 3 }}>
              {importStatus === 'success' ? 'Restore successful' : 'Restore failed'}
            </div>
            <div style={{ color: T.dim, fontSize: 13 }}>{importMsg}</div>
          </div>
        </div>
      )}

      {/* Phone switch tip */}
      <div style={{ background: T.limeDim, border: `1px solid rgba(200,255,0,0.2)`, borderRadius: 16, padding: '16px 18px', marginBottom: 24 }}>
        <div style={{ fontWeight: 800, fontSize: 13, color: T.lime, letterSpacing: '-0.01em', marginBottom: 8 }}>Switching phones?</div>
        <div style={{ color: T.dim, fontSize: 13, lineHeight: 1.7 }}>
          1. Tap <strong style={{ color: T.white }}>Export Backup</strong> and save to iCloud / Google Drive.<br/>
          2. Copy <strong style={{ color: T.white }}>workout.html</strong> to your new phone the same way.<br/>
          3. Open it in Safari/Chrome → Settings → <strong style={{ color: T.white }}>Restore from Backup</strong>.
        </div>
      </div>

      {/* Danger zone */}
      <div style={{ background: T.card, borderRadius: 18, border: `1px solid rgba(255,59,48,0.2)`, overflow: 'hidden', marginBottom: 32 }}>
        <div style={{ padding: '14px 18px', borderBottom: `1px solid rgba(255,59,48,0.15)` }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: T.red, letterSpacing: '-0.01em' }}>Danger Zone</div>
        </div>
        <div style={{ padding: '14px 18px' }}>
          <button onClick={() => setConfirmReset(true)} style={{
            width: '100%', background: T.redDim, border: `1px solid rgba(255,59,48,0.25)`,
            color: T.red, borderRadius: 12, padding: '13px', fontSize: 14, fontWeight: 700,
          }}>Reset All Data</button>
        </div>
      </div>

      {confirmReset && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.94)', zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
          <div style={{ background: T.card, borderRadius: 24, padding: 28, width: '100%', maxWidth: 360, textAlign: 'center', border: `1px solid ${T.border}` }}>
            <div style={{ width: 64, height: 64, borderRadius: '50%', background: T.redDim, border: `1px solid rgba(255,59,48,0.25)`, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px' }}>
              <Icon.Trash size={28} color={T.red} />
            </div>
            <div style={{ fontWeight: 800, fontSize: 22, letterSpacing: '-0.03em', marginBottom: 8 }}>Reset everything?</div>
            <div style={{ color: T.dim, fontSize: 14, lineHeight: 1.6, marginBottom: 24 }}>All workouts, program and custom exercises will be permanently deleted.</div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setConfirmReset(false)} style={{ flex:1, background:T.card2, border:'none', color:T.white, borderRadius:12, padding:'14px', fontSize:15, fontWeight:600 }}>Cancel</button>
              <button onClick={handleReset} style={{ flex:1, background:T.red, border:'none', color:T.white, borderRadius:12, padding:'14px', fontSize:15, fontWeight:800 }}>Reset</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────

function App() {
  const [tab,           setTab]           = useState('today');
  const [exercises,     setExercises]     = useState(() => S.get('wa_exercises', SEED_EXERCISES));
  const [program,       setProgram]       = useState(() => S.get('wa_program', SEED_PROGRAM));
  const [logs,          setLogs]          = useState(() => S.get('wa_logs', SEED_LOGS));
  const [activeWorkout, setActiveWorkout] = useState(() => S.get('wa_active', null));

  useEffect(() => { S.set('wa_exercises', exercises); }, [exercises]);
  useEffect(() => { S.set('wa_program',   program);   }, [program]);
  useEffect(() => { S.set('wa_logs',      logs);      }, [logs]);
  useEffect(() => { S.set('wa_active',    activeWorkout); }, [activeWorkout]);

  const saveWorkout = useCallback(() => {
    if (!activeWorkout) return;
    setLogs(prev => [{ id: Date.now().toString(), date: new Date().toISOString().split('T')[0], dayName: activeWorkout.dayName, exercises: activeWorkout.exercises }, ...prev]);
    setActiveWorkout(null);
  }, [activeWorkout]);

  const props = { exercises, setExercises, program, setProgram, logs, setLogs, activeWorkout, setActiveWorkout, saveWorkout, setTab };

  const TABS = [
    { key:'today',    label:'Today',    Icon: Icon.Dumbbell },
    { key:'program',  label:'Program',  Icon: Icon.Calendar  },
    { key:'progress', label:'Progress', Icon: Icon.Chart     },
    { key:'library',  label:'Library',  Icon: Icon.List      },
    { key:'settings', label:'Settings', Icon: Icon.Settings  },
  ];

  return (
    <div style={{ maxWidth: 480, margin: '0 auto', minHeight: '100vh', background: T.bg, paddingBottom: 80 }}>
      {tab === 'today'    && <TodayView    {...props} />}
      {tab === 'program'  && <ProgramView  {...props} />}
      {tab === 'progress' && <ProgressView {...props} />}
      {tab === 'library'  && <LibraryView  {...props} />}
      {tab === 'settings' && <SettingsView {...props} />}

      {/* Bottom nav */}
      <nav style={{
        position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)',
        width: '100%', maxWidth: 480,
        background: 'rgba(14,14,14,0.95)',
        borderTop: `1px solid ${T.border}`,
        backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
        display: 'flex', zIndex: 100,
        paddingBottom: 'env(safe-area-inset-bottom, 0px)',
      }}>
        {TABS.map(({ key, label, Icon: TabIcon }) => {
          const active = tab === key;
          return (
            <button key={key} onClick={() => setTab(key)} style={{
              flex: 1, padding: '11px 0 9px', background: 'none', border: 'none',
              color: active ? T.lime : T.dim,
              fontSize: 10, fontWeight: active ? 700 : 500, letterSpacing: '0.02em',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              position: 'relative',
            }}>
              {key === 'today' && activeWorkout && (
                <span style={{ position: 'absolute', top: 8, right: '26%', width: 6, height: 6, background: T.lime, borderRadius: '50%' }} />
              )}
              <TabIcon size={21} color={active ? T.lime : T.dim} />
              {label}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
